name: CI - Testing & Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Ejecutar pruebas y linters
    runs-on: ubuntu-24.04

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Instalar dependencias del backend
        run: |
          cd app/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas del backend con pytest
        run: |
          cd app/backend
          pytest --disable-warnings

      - name: Linting backend con flake8
        run: |
          cd app/backend
          flake8 .

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias del frontend
        run: |
          cd app/frontend
          npm install

      - name: Ejecutar pruebas del frontend con Jest
        run: |
          cd app/frontend
          npm test -- --watchAll=false

      - name: Linting frontend con ESLint
        run: |
          cd app/frontend
          npm run lint
